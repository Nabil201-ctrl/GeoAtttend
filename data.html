<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(new Date().toUTCString())
     const geoData = navigator.geolocation.getCurrentPosition(
        (position) => {
            for(key in position.coords){
                document.write(key + ': '+ position.coords[key]);
                document.write(`<br>`)
            }
            fetch('/student', {
                    method: 'POST', 
                    headers: {
                        'Content-type': 'application/text',
                        body: JSON.stringify({
                            coordiates: position.coords
                        })
                    }
                })
        }
    )
    </script>
</body>
</html>
